<!DOCTYPE html>

<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>THE ART OF PRINT</title>
    <!-- Material Symbols -->
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        html.lenis,
        html.lenis body {
            height: auto;
        }

        .lenis.lenis-smooth {
            scroll-behavior: auto !important;
        }

        .lenis.lenis-smooth [data-lenis-prevent] {
            overscroll-behavior: contain;
        }

        .lenis.lenis-stopped {
            overflow: hidden;
        }

        .lenis.lenis-scrolling iframe {
            pointer-events: none;
        }

        /* Intro Page Animations */
        @keyframes slowZoom {
            0% {
                transform: scale(1);
            }

            100% {
                transform: scale(1.15);
            }
        }

        .animate-slow-zoom {
            animation: slowZoom 30s ease-out forwards;
        }

        @keyframes scrollLine {
            0% {
                transform: scaleY(0);
                transform-origin: top;
            }

            50% {
                transform: scaleY(1);
                transform-origin: top;
            }

            50.1% {
                transform: scaleY(1);
                transform-origin: bottom;
            }

            100% {
                transform: scaleY(0);
                transform-origin: bottom;
            }
        }

        .animate-scroll-line {
            animation: scrollLine 2.5s cubic-bezier(0.77, 0, 0.175, 1) infinite;
        }

        /* --- REPLACE ALL PREVIOUS .info-pill CSS WITH THIS --- */

        .info-reveal-group {
            /* Ensures the group stays anchored properly */
            pointer-events: none;
        }

        .info-btn-trigger {
            pointer-events: auto;
            transition: background-color 0.3s ease;
        }

        .info-text-mask {
            /* The invisible window the text slides out from */
            overflow: hidden;
            /* Extra padding prevents the text's drop-shadow from being clipped */
            padding: 8px 12px 8px 0;
            margin: -8px -12px -8px 0;
            pointer-events: none;
        }

        .info-credit-text {
            /* Hardware-accelerated sliding */
            transform: translateX(-110%);
            opacity: 0;
            will-change: transform, opacity;
            /* Cubic-bezier for a snappy out, smooth settle motion */
            transition: transform 0.65s cubic-bezier(0.22, 1, 0.36, 1),
                opacity 0.4s ease 0.05s;
            /* Slight delay on opacity */

            /* Typography styling for a transparent background */
            width: max-content;
            max-width: 300px;
            white-space: normal;
            color: rgba(255, 255, 255, 0.95);
            text-shadow: 0px 2px 8px rgba(0, 0, 0, 0.8), 0px 1px 3px rgba(0, 0, 0, 0.9);
        }

        /* Hover & Force-Open States */
        .info-reveal-group:hover .info-credit-text,
        .info-reveal-group.force-open .info-credit-text {
            transform: translateX(0);
            opacity: 1;
            transition: transform 0.65s cubic-bezier(0.22, 1, 0.36, 1),
                opacity 0.3s ease;
        }

        /* --- PREMIUM NAVIGATION UI --- */
        .glass-nav-btn {
            background: rgba(19, 19, 19, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            will-change: transform, background-color;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .glass-nav-btn:hover {
            background: rgba(35, 35, 35, 0.8);
            border-color: rgba(255, 255, 255, 0.4);
            transform: scale(1.08);
        }

        .menu-link {
            will-change: transform, opacity, color;
        }

        /* --- STICKY LOGO PREMIUM WHITE CONTAINER STYLING --- */
        #sticky-logo-container {
            will-change: transform, opacity;
            transition: all 0.7s cubic-bezier(0.25, 1, 0.5, 1);
        }

        #sticky-logo-container a {
            display: block;
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* Intro Slide: Hero Size & Full Visibility */
        #sticky-logo-container.logo-big {
            opacity: 1;
        }

        #sticky-logo-container.logo-big img {
            height: 38px;
            width: auto;
            transition: all 0.7s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* --- SLOW READS LOGO --- */
        #slow-reads-logo-container {
            transition: opacity 0.7s cubic-bezier(0.25, 1, 0.5, 1);
            opacity: 1;
        }

        #slow-reads-logo-container.faded {
            opacity: 0 !important;
            pointer-events: none;
        }

        #slow-reads-logo-container a {
            display: block;
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        #slow-reads-logo-container img {
            height: 35px;
            width: auto;
            transition: all 0.7s cubic-bezier(0.25, 1, 0.5, 1);
        }

        @media (max-width: 768px) {
            #sticky-logo-container.logo-big img {
                height: 35px;
            }

            #slow-reads-logo-container img {
                height: 28px;
            }
        }

        /* Other Slides: Smaller & Ghost/Translucent Visibility */
        #sticky-logo-container.logo-small {
            opacity: 0.4;
            /* fades smoothly out of focal path */
        }

        #sticky-logo-container.logo-small img {
            height: 28px;
            width: auto;
            transition: all 0.7s cubic-bezier(0.25, 1, 0.5, 1);
        }

        @media (max-width: 768px) {
            #sticky-logo-container.logo-small img {
                height: 24px;
            }
        }

        /* Dynamic Hover States */
        #sticky-logo-container.logo-small:hover {
            opacity: 1;
            /* returns to full visibility when hovered */
        }

        #sticky-logo-container a:hover,
        #slow-reads-logo-container a:hover {
            transform: scale(1.05);
        }

        /* --- PRINTMAKING MATERIAL EFFECTS --- */

        /* The Inked Emboss for Chapter Transitions */
        .chapter-title-deboss {
            color: #F4F1EA;
            /* High contrast ivory paper color */
            text-shadow:
                0px 8px 30px rgba(4, 11, 28, 0.95),
                /* Deep navy shadow instead of black */
                0px 2px 5px rgba(232, 165, 93, 0.6);
            /* Warm gold/copper highlight */
            will-change: transform, opacity;
            /* Hardware acceleration for smooth GSAP animation */
        }

        /* The Editorial Drop-Cap (Replaces your inline styles) */
        .editorial-dropcap {
            color: #A62B2B;
            /* Madder Red */
            font-family: 'Playfair Display', serif;
            font-size: 3.2em;
            line-height: 0.8;
            float: left;
            margin-right: 8px;
            margin-top: 4px;
            font-style: normal;
            text-shadow: 1px 1px 0px rgba(0, 0, 0, 0.5);
        }

        /* The Ink Roll Navigation Hover */
        .menu-link {
            position: relative;
            overflow: hidden;
            padding-bottom: 4px;
        }

        .menu-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: currentColor;
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .menu-link:hover::after {
            transform: scaleX(1);
            transform-origin: left;
        }

        /* --- HARDWARE ACCELERATION FOR GSAP IMAGE ANIMATIONS --- */
        .fg-crop,
        .fg-full {
            will-change: transform, opacity;
            /* Forces a dedicated compositor layer to prevent paint-flashing on mobile */
            transform: translateZ(0);
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            /* Ensures smooth scaling without pixel snapping */

        }

        /* Horizontal Custom Context Scroll Layer */
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.03);
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(232, 165, 93, 0.3);
            border-radius: 2px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(232, 165, 93, 0.6);

        }

        /* Add hardware acceleration to horizontal tracking and cards */
        .horizontal-track {
            will-change: transform;
            transform: translateZ(0);
            backface-visibility: hidden;

        }

        .text-card {
            will-change: transform, opacity;
            transform: translateZ(0);
            /* On very old devices, backdrop-filter is a frame-killer. 
            This fallback ensures it degrades gracefully without lagging. */
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
            /* Add the standard property here */
        }

        /* --- MOBILE PERFORMANCE OVERRIDES (All phones up to 768px) --- */
        @media (max-width: 768px) {

            /* Kill backdrop blur + free VRAM: idle cards no longer hold compositor layers */
            .text-card {
                -webkit-backdrop-filter: none !important;
                backdrop-filter: none !important;
                background-color: rgba(10, 25, 49, 0.98) !important;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8) !important;
                will-change: auto !important;
            }

            /* scale-125 wastes GPU fill-rate across all slides during horizontal pan;
               1.02 is enough to cover edge-bleed without the overhead */
            .horizontal-slide .scale-125 {
                --tw-scale-x: 1.02 !important;
                --tw-scale-y: 1.02 !important;
            }

            /* 32px circle, undetectable visually, no reason to composite a blur layer */
            .info-btn-trigger {
                -webkit-backdrop-filter: none !important;
                backdrop-filter: none !important;
                background: rgba(30, 30, 30, 0.9) !important;
            }

            /* Forces a separate alpha-compositing pass per frame — the silent frame-killer */
            .mix-blend-plus-lighter {
                mix-blend-mode: normal !important;
            }

            /* drop-shadow traces alpha channels per frame; box-shadow is compositor-free */
            .horizontal-slide .drop-shadow-2xl,
            .horizontal-slide picture {
                filter: none !important;
                -webkit-filter: none !important;
            }
        }

        /* --- AGGRESSIVE OVERRIDES for narrow phones (< 700px) --- */
        @media (max-width: 700px) {

            /* Kill heavy background blurs on vertical sections */
            .pin-bg img.scale-125,
            .horizontal-slide img.scale-125 {
                filter: none !important;
                -webkit-filter: none !important;
                opacity: 0.15 !important;
            }
        }

        /* --- RESPONSIVE INTRO FOR SHORT VIEWPORTS --- */
        @media (max-height: 600px) {
            .intro-title h1 {
                font-size: clamp(2rem, 10vmin, 5rem) !important;
                margin-bottom: 0.5rem !important;
            }

            .intro-title .intro-tagline {
                font-size: 10px !important;
                margin-bottom: 0.25rem !important;
            }

            .intro-title .intro-subtitle {
                font-size: 14px !important;
            }
        }

        @media (max-height: 450px) {
            .intro-title h1 {
                font-size: clamp(1.5rem, 8vmin, 3rem) !important;
                line-height: 0.95 !important;
            }

            .intro-title .intro-subtitle {
                display: none !important;
            }
        }

        /* --- DESKTOP SIDE PANEL NAVIGATION --- */
        #desktop-side-panel {
            position: fixed;
            left: clamp(10px, 2vw, 24px);
            top: 50%;
            transform: translateY(-50%) translateX(-150%);
            z-index: 60;
            opacity: 0;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1),
                opacity 0.5s ease;
            pointer-events: none;
        }

        #desktop-side-panel.panel-visible {
            transform: translateY(-50%) translateX(0);
            opacity: 1;
            pointer-events: auto;
        }

        .side-panel-inner {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: clamp(4px, 1vh, 8px);
            padding: clamp(10px, 2vh, 16px) 0;
            transition: all 0.4s ease;
        }

        .side-panel-divider {
            width: 20px;
            height: 1px;
            background: rgba(255, 255, 255, 0.15);
            margin: clamp(2px, 0.5vh, 6px) 14px;
        }

        .side-panel-arrow {
            display: flex;
            align-items: center;
            justify-content: center;
            width: clamp(24px, 4vh, 32px);
            height: clamp(24px, 4vh, 32px);
            border-radius: 8px;
            border: none;
            background: transparent;
            color: rgba(255, 255, 255, 0.35);
            cursor: pointer;
            transition: all 0.3s ease;
            align-self: flex-start;
            margin-left: 6px;
        }

        .side-panel-arrow:hover {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.9);
        }

        .side-panel-item {
            display: flex;
            align-items: center;
            gap: clamp(12px, 1.5vw, 18px);
            padding: clamp(8px, 1vh, 12px) clamp(10px, 1.2vw, 14px);
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.35s cubic-bezier(0.25, 1, 0.5, 1);
            flex-direction: row;
            background: transparent;
            border: 1px solid transparent;
        }

        .side-panel-item:hover {
            background: rgba(19, 19, 19, 0.3);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transform: translateX(4px);
        }

        .side-panel-item.active {
            background: rgba(19, 19, 19, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            transform: translateX(4px);
        }

        .side-panel-dot {
            width: clamp(12px, 1.8vh, 16px);
            height: clamp(12px, 1.8vh, 16px);
            border-radius: 50%;
            flex-shrink: 0;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            box-shadow: 0 0 6px 1px currentColor;
            opacity: 0.6;
        }

        .side-panel-item:hover .side-panel-dot {
            opacity: 1;
            transform: scale(1.15);
            box-shadow: 0 0 12px 3px currentColor;
        }

        .side-panel-item.active .side-panel-dot {
            opacity: 1;
            transform: scale(1.3);
            box-shadow: 0 0 16px 4px currentColor, 0 0 4px 1px white inset;
        }

        .side-panel-label {
            font-family: 'Inter', sans-serif;
            font-size: clamp(10px, 1.2vh, 12px);
            font-weight: 500;
            letter-spacing: 0.05em;
            color: rgba(255, 255, 255, 0);
            white-space: nowrap;
            text-transform: uppercase;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            max-width: 0;
            overflow: hidden;
            opacity: 0;
        }

        .side-panel-inner:hover .side-panel-label {
            max-width: 240px;
            color: rgba(255, 255, 255, 0.7);
            opacity: 1;
        }

        .side-panel-item:hover .side-panel-label {
            color: rgba(255, 255, 255, 1);
        }

        .side-panel-item.active .side-panel-label {
            max-width: 240px;
            color: rgba(255, 255, 255, 0.95);
            opacity: 1;
        }
    </style>

                            boxText: 'Around 1816–17, in the lanes of north Kolkata — Bat-tala, Haatkhola, Darjipara — Bengali-owned presses began to sprout. The books they printed were earthy: folk poetry, Puranas, one-act plays, Vedanta. At first, just text. Then someone decided to add pictures. Those pictures — woodcut and metal-plate engravings — became the first prints made by Bengalis.',

        mainContainer.innerHTML = htmlContent;

        // GSAP ScrollTrigger setup

        // Sync ScrollTrigger with Lenis, handle side-arrows visibility and sticky logo scaling

        lenis.on('scroll', (e) => {

        gsap.ticker.lagSmoothing(0);

        // Setup animations
        setTimeout(() => {
            // 1. DYNAMIC HORIZONTAL TRACKS GENERATION (Staggered Execution)
            const horizontalWrappers = document.querySelectorAll('.horizontal-subsection-wrapper');
            let hintShown = false;

            horizontalWrappers.forEach((wrapper) => {
                const track = wrapper.querySelector('.horizontal-track');
                const slides = gsap.utils.toArray(wrapper.querySelectorAll('.horizontal-slide'));
                const infoPills = wrapper.querySelectorAll('.info-reveal-group');



                // Create the master timeline for this specific track
                const tl = gsap.timeline({
                    scrollTrigger: {
                        trigger: wrapper,
                        start: "top top",
                        end: "bottom bottom",
                        scrub: isTouchDevice ? 0.3 : 0.6,
                        invalidateOnRefresh: true,
                        anticipatePin: 1, // Prevents mobile browsers from flashing when sticky engages

                                start: "top top",
                                end: "bottom bottom",
                                scrub: true
                            }

                    });

                slides.forEach((slide, index) => {

                            ease: "none",
                            duration: 1

                    const hzCrop = slide.querySelector('.hz-fg-crop');
                    const hzFull = slide.querySelector('.hz-fg-full');

                        );

                    // Trigger the info pill horizontally for this specific slide

                    if (cards.length === 0) {

                                opacity: 0,
                                x: () => window.innerWidth >= 768 ? 100 : 0,
                                y: () => window.innerWidth < 768 ? 80 : 0,
                                scale: () => window.innerWidth < 768 ? 1 : 0.95
                            }, {
                                opacity: 1,
                                x: 0,
                                y: 0,
                                scale: 1,
                                duration: 1,
                                ease: "power1.out"
                            });

                            // Standardized reading pause
                            tl.to({}, { duration: 0.8 });

                            // Slide out logic
                            if (cIdx < cards.length - 1) {
                                // Fade out to make room for the next card in this same slide
                                tl.to(card, {
                                    opacity: 0,
                                    y: -15,
                                    duration: 0.25,
                                    ease: "power2.in"
                                });
                            } else if (index < slides.length - 1) {

                    tl.to(introTitle, { opacity: 0, y: -80, duration: 0.8 }, 0);
                }

                const shouldReveal = sec.getAttribute('data-enable-reveal') !== 'false';
                if (fgCrop && fgFull && shouldReveal) {
                    tl.to(fgCrop, { opacity: 0, duration: 0.7 }, 0);
                    tl.fromTo(fgFull, { scale: 1.15, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.7 }, 0);
                }

                if (textBoxes.length > 0) {
                    for (let i = 1; i < textBoxes.length; i++) {
                        gsap.set(textBoxes[i], { autoAlpha: 0, y: 96 });
                    }

                    for (let i = 0; i < textBoxes.length; i++) {
                        const startPosition = (i === 0 && introTitle) ? ">" : (i === 0 ? 0 : ">");
                        tl.fromTo(textBoxes[i],
                            { autoAlpha: 0, y: 100 },
                            { autoAlpha: 1, y: 0, duration: 1, ease: "power1.out" },
                            startPosition
                        );
                        tl.to(textBoxes[i], { y: -30, duration: 1.5, ease: "none" });
                        if (i < textBoxes.length - 1) {
                            tl.to(textBoxes[i], { autoAlpha: 0, y: -150, duration: 1, ease: "power1.in" });
                        }
                    }
                } else {
                    tl.to({}, { duration: 2 });
                }
            });

            // 3. CHAPTER TRANSITION TYPOGRAPHY LAYER
            const chapterTransitions = document.querySelectorAll('.chapter-transition');
            chapterTransitions.forEach(transition => {
                const title = transition.querySelector('.chapter-title-deboss');
                const dot = transition.querySelector('.rounded-full');

                if (title) {
                    gsap.set(title, { autoAlpha: 0, y: 60, scale: 0.95 });
                    if (dot) gsap.set(dot, { autoAlpha: 0, scale: 0 });

                    const tl = gsap.timeline({
                        scrollTrigger: {
                            trigger: transition,
                            start: "top 75%",
                            toggleActions: "play reverse play reverse"
                        }
                    });

                    tl.to(title, { autoAlpha: 1, y: 0, scale: 1, duration: 1.2, ease: "expo.out" })
                        .to(dot, { autoAlpha: 1, scale: 1, duration: 0.8, ease: "back.out(1.5)" }, "-=0.8");
                }
            });
        }, 100);

        // --- NAVIGATION & MENU LOGIC ---

        // 1. Menu Configuration (Customize Names & Colors here)
        const MENU_CONFIG = [
            { label: "Prologue", target: "#nav-anchor-intro", color: "#e5e2e1" }, // Base White
            { label: "What is Printmaking?", target: "#nav-anchor-what-is", color: "#D4AF37" }, // Premium Gold Accent
            { label: "Major Techniques", target: "#nav-anchor-mediums", color: "#E8A55D" }, // Warm Gold
            { label: "Early Roots", target: "#nav-anchor-pre-partition", color: "#4A90E2" }, // Archival Blue
            { label: "Pioneers of Bengal", target: "#nav-anchor-early-pioneers", color: "#9B59B6" }, // Deep Purple
            { label: "Banglay Bidroho", target: "#nav-anchor-bangla-bidroho", color: "#E74C3C" }, // Resistance Red
            { label: "The Present", target: "#nav-anchor-current", color: "#1ABC9C" } // Modern Teal
        ];

        // 2. Build the Menu dynamically
        const menuNav = document.getElementById('menu-nav');

        MENU_CONFIG.forEach((item) => {
            const btn = document.createElement('button');
            btn.className = `menu-link font-display-md text-3xl md:text-5xl lg:text-6xl tracking-wide opacity-0 translate-y-8 hover:scale-[1.03] transition-transform duration-300 drop-shadow-lg`;
            btn.style.color = item.color;
            btn.innerHTML = `<i>${item.label}</i>`; // Using italics to match your premium aesthetic

            btn.onclick = () => {
                toggleMenu(); // Close the menu

                // Wait for the menu fade-out, then fire Lenis for an ultra-smooth ride
                setTimeout(() => {
                    lenis.scrollTo(item.target, {
                        offset: 0,
                        duration: 1.8, // Slightly longer duration for a cinematic sweep
                        easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t))
                    });
                }, 450);
            };
            menuNav.appendChild(btn);
        });

        // 2b. Build Desktop Side Panel Navigation
        const sidePanelNav = document.getElementById('side-panel-nav');
        if (sidePanelNav) {
            MENU_CONFIG.forEach((item, idx) => {
                const navItem = document.createElement('div');
                navItem.className = 'side-panel-item';
                navItem.dataset.index = idx;
                navItem.innerHTML = `
                    <span class="side-panel-label">${item.label}</span>
                    <span class="side-panel-dot" style="background-color: ${item.color}; color: ${item.color};"></span>
                `;
                navItem.addEventListener('click', () => {
                    lenis.scrollTo(item.target, {
                        offset: 0,
                        duration: 1.8,
                        easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t))
                    });
                });
                sidePanelNav.appendChild(navItem);
            });

            // Active section tracking
            const panelItems = sidePanelNav.querySelectorAll('.side-panel-item');
            function setActivePanel(activeIdx) {
                panelItems.forEach((item, idx) => {
                    item.classList.toggle('active', idx === activeIdx);
                });
            }

            MENU_CONFIG.forEach((item, idx) => {
                const anchor = document.querySelector(item.target);
                if (anchor) {
                    ScrollTrigger.create({
                        trigger: anchor,
                        start: 'top 50%',
                        onEnter: () => setActivePanel(idx),
                        onLeaveBack: () => setActivePanel(Math.max(0, idx - 1))
                    });
                }
            });
        }

        // 3. Hamburger Toggle Logic with GSAP Stagger
        let menuOpen = false;
        const menuToggle = document.getElementById('menu-toggle');
        const fullscreenMenu = document.getElementById('fullscreen-menu');
        const line1 = menuToggle.querySelector('.line-1');
        const line2 = menuToggle.querySelector('.line-2');

        function toggleMenu() {
            menuOpen = !menuOpen;
            if (menuOpen) {
                // Open State
                fullscreenMenu.classList.remove('opacity-0', 'pointer-events-none');
                fullscreenMenu.classList.add('opacity-100', 'pointer-events-auto');
                line1.style.transform = 'translateY(3.5px) rotate(45deg)';
                line2.style.transform = 'translateY(-3.5px) rotate(-45deg)';

                // Pause Lenis so the background doesn't scroll while menu is open
                lenis.stop();

                // Animate links in sequentially
                gsap.fromTo('.menu-link',
                    { y: 40, opacity: 0 },
                    { y: 0, opacity: 1, duration: 0.6, stagger: 0.06, ease: 'power3.out', delay: 0.2 }
                );
            } else {
                // Close State
                fullscreenMenu.classList.add('opacity-0', 'pointer-events-none');
                fullscreenMenu.classList.remove('opacity-100', 'pointer-events-auto');
                line1.style.transform = 'none';
                line2.style.transform = 'none';

                // Resume scrolling
                lenis.start();
            }
        }
        menuToggle.addEventListener('click', toggleMenu);

        // 4. Up/Down Arrow Logic (Viewport Panning)
        // Since it's a scrollytelling piece with scrubs, scrolling by viewport height is safer than snapping to IDs so you don't miss animations.
        // 4. Up/Down Arrow Logic (Viewport Panning)
        // Calibrated to 0.55 to match the 50vh/60vh step height of the GSAP timelines.
        // This ensures one click equals roughly one animation step, preventing skipping.
        document.getElementById('scroll-down').addEventListener('click', () => {
            lenis.scrollTo(window.scrollY + (window.innerHeight * 0.55), {
                duration: 0.9, // Slightly sped up to feel responsive with the shorter distance
                easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t))
            });
        });

        document.getElementById('scroll-up').addEventListener('click', () => {
            lenis.scrollTo(window.scrollY - (window.innerHeight * 0.55), {
                duration: 0.9,
                easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t))
            });
        });

    </script>
</body>

</html>
